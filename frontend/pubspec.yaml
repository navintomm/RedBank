name: redbank_app
description: Red Bank Emergency Blood Logistics
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.1
  dio: ^5.4.0
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_messaging: ^14.7.9
  
  # Maps & Location
  google_maps_flutter: ^2.10.1
  geolocator: ^12.0.0
  
  # UI Utilities
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  geocoding: ^4.0.0
  image_picker: ^1.1.2
  image_cropper: ^10.0.0+1
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  mocktail: ^1.0.5
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
