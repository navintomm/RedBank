name: Red Bank CI

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  backend-test:
    name: Spring Boot CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build and Test
      working-directory: ./backend
      run: mvn -B test

  frontend-test:
    name: Flutter CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'
    - name: Get Dependencies
      working-directory: ./frontend
      run: flutter pub get
    - name: Analyze Code
      working-directory: ./frontend
      run: flutter analyze
    - name: Run Tests
      working-directory: ./frontend
      run: flutter test
