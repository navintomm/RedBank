version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: redbank_user
      POSTGRES_PASSWORD: redbank_password
      POSTGRES_DB: redbank_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redbank_user -d redbank_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
